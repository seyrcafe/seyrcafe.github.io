<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seyr Kurabiye</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f7f3;
      color: #333;
    }header {
  background-color: #fff;
  padding: 20px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

header h1 {
  margin: 0;
  color: #b08968;
  font-size: 32px;
}

.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h2 {
  font-size: 28px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 18px;
  color: #666;
}

.product {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

.product img {
  width: 250px;
  border-radius: 20px;
  margin-bottom: 20px;
}

.product h3 {
  margin: 10px 0;
  font-size: 24px;
}

.product p {
  max-width: 400px;
  text-align: center;
  color: #555;
}

.price {
  font-size: 22px;
  margin: 15px 0;
  color: #b08968;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background-color: #b08968;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #9c6f52;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 14px;
  color: #777;
}

  </style>
</head>
<body><header>
  <h1>Seyr Kurabiye</h1>
</header><section class="hero">
  <h2>Şekersiz, Doğal, Bağımlılık Yapan Lezzet</h2>
  <p>Bal ile tatlandırılmış özel tarif kurabiye</p>
</section><section class="product">
  <img src="https://images.unsplash.com/photo-1606312619344-4d9c3f1f3b44" alt="kurabiye">
  <h3>Ballı Özel Kurabiye</h3>
  <p>Hiç şeker kullanılmadan, tamamen doğal bal ile hazırlanmış. Yiyen bir daha ister.</p>
  <div class="price">200 TL</div>
  <button onclick="order()">Sipariş Ver</button>
</section><footer>
  © 2026 Seyr Kurabiye
</footer><script>
  function order() {
    alert("Sipariş sistemi yakında aktif olacak!");
  }
</script></body>
</html>
